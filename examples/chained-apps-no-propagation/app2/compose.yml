services:
  caddy-app2:
    image: caddy:2
    depends_on:
      - app2
      - proxylens-addon-app2
    environment:
      HTTP_PROXY: http://proxylens-addon-app2:8080
      HTTPS_PROXY: http://proxylens-addon-app2:8080
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../.data/tls:/certs:ro
    networks:
      - chained-apps-no-propagation

  proxylens-addon-app2:
    build:
      context: ../../..
      dockerfile: examples/chained-apps-no-propagation/proxy/Dockerfile
    environment:
      PROXYLENS_NODE_NAME: app2
      PROXYLENS_SERVER_BASE_URL: http://proxylens-server:8000
      PROXYLENS_MAX_CONCURRENT_REQUESTS_PER_HOST: "1"
    expose:
      - "8080"
    networks:
      - chained-apps-no-propagation

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_BIND: 0.0.0.0
      APP_PORT: "9443"
      APP_CERT_FILE: /certs/localhost.crt
      APP_KEY_FILE: /certs/localhost.key
      DOWNSTREAM_URL: https://caddy-app3:8443/
      HTTP_PROXY: http://proxylens-addon-app2:8080
      HTTPS_PROXY: http://proxylens-addon-app2:8080
    init: true
    tty: true
    volumes:
      - ../.data/tls:/certs:ro
    networks:
      - chained-apps-no-propagation

networks:
  chained-apps-no-propagation:
    name: proxylens-chained-apps-no-propagation
    external: true

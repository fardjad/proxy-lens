services:
  proxylens-server:
    build:
      context: ../..
      dockerfile: examples/chained-apps-with-propagation/server.Dockerfile
    command:
      - proxylens-server
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --data-dir
      - /data
      - --no-access-log
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./.data/server:/data
    networks:
      - chained-apps-with-propagation

networks:
  chained-apps-with-propagation:
    name: proxylens-chained-apps-with-propagation
    external: true

services:
  proxylens:
    build:
      context: .
      target: runtime
    ports:
      - "${PROXYLENS_UI_HOST_PORT:-8080}:8080"
      - "${PROXYLENS_SERVER_HOST_PORT:-8000}:8000"
    environment:
      PROXYLENS_UI_PORT: 8080
      PROXYLENS_SERVER_PORT: 8000
      PROXYLENS_SERVER_DATA_DIR: /data
    volumes:
      - proxylens-data:/data
    restart: unless-stopped

volumes:
  proxylens-data:
